<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>森沐工业ERP（SENMOO）管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ 登录页 ============ -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <div class="login-logo-wrap">
      <div class="login-logo-icon">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <path d="M10 36L16 12H22L28 36H22.8L21.6 31H16.4L15.2 36H10ZM16.5 26.5H21.5L20 21.5L16.5 26.5Z" fill="white"/>
          <rect x="29" y="12" width="8" height="24" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <h1 class="login-title">森沐工业ERP</h1>
      <p class="login-subtitle">SENMOO · 进销存 · 生产管理 · 财务一体化</p>
    </div>
    <div class="login-form">
      <div class="form-item">
        <label>用户名</label>
        <input type="text" id="loginUser" value="admin" placeholder="请输入用户名">
      </div>
      <div class="form-item">
        <label>密码</label>
        <input type="password" id="loginPass" value="123456" placeholder="请输入密码">
      </div>
      <div class="form-item">
        <label>登录角色</label>
        <select id="loginRole">
          <option value="admin">系统管理员</option>
          <option value="boss">老板 / 厂长</option>
          <option value="sales">销售部门</option>
          <option value="purchase">采购部门</option>
          <option value="warehouse">仓库部门</option>
          <option value="production">生产部门</option>
          <option value="finance">财务部门</option>
        </select>
      </div>
      <button class="login-btn" onclick="doLogin()">登 录 系 统</button>
      <p class="login-hint">演示账号：admin / 123456</p>
    </div>
  </div>
</div>

<!-- ============ 主系统 ============ -->
<div id="mainApp" class="main-app" style="display:none">

  <!-- 顶部导航 -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="topbar-toggle" onclick="toggleSidebar()" title="展开/收起菜单">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="topbar-brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 48 48" fill="none">
            <path d="M10 36L16 12H22L28 36H22.8L21.6 31H16.4L15.2 36H10ZM16.5 26.5H21.5L20 21.5L16.5 26.5Z" fill="white"/>
            <rect x="29" y="12" width="8" height="24" fill="white" opacity="0.9"/>
          </svg>
        </div>
        <span class="brand-name">森沐工业ERP</span>
      </div>
      <!-- 面包屑 -->
      <div class="topbar-breadcrumb" id="topbarBreadcrumb">
        <span class="crumb">首页</span>
      </div>
    </div>

    <div class="topbar-right">
      <!-- 消息 -->
      <button class="topbar-icon-btn" onclick="navigate('message')" title="消息通知">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="badge">3</span>
      </button>
      <!-- 用户 -->
      <div class="topbar-user" id="topbarUser" onclick="toggleUserMenu()">
        <div class="avatar" id="userAvatar">管</div>
        <div class="sidebar-user-info">
          <div class="username" id="userNameDisplay">管理员</div>
          <div class="role-tag" id="userRoleDisplay">系统管理员</div>
        </div>
        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
        <div class="user-dropdown" id="userDropdown">
          <div class="user-dropdown-item" onclick="navigate('personal')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            个人中心
          </div>
          <div class="user-dropdown-divider"></div>
          <div class="user-dropdown-item danger" onclick="doLogout()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            退出登录
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="app-body">
    <!-- 侧边栏（由 app.js 动态渲染） -->
    <nav class="sidebar" id="sidebarNav"></nav>

    <!-- 内容区 -->
    <main class="content-area" id="contentArea">
      <div class="page-header" id="pageHeader">
        <div class="page-header-left">
          <h1 class="page-title" id="pageTitle">系统首页</h1>
        </div>
        <div class="page-header-right" id="pageActions"></div>
      </div>
      <div class="page-body" id="pageContent"></div>
    </main>
  </div>
</div>

<!-- ============ 模态框 ============ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-header">
    <span class="modal-title" id="modalTitle">标题</span>
    <button class="modal-close" onclick="closeModal()">×</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
  <div class="modal-footer" id="modalFooter"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
